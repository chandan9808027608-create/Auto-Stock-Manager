name: Keep Backend Alive

on:
  schedule:
    # Every 10 minutes - Render's free tier spins down after 15 min of inactivity
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: curl -sf --max-time 30 https://auto-stock-manager.onrender.com/api/health
