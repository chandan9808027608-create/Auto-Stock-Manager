services:
  - type: web
    name: hamro-gng-auto-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: hamro_gng_auto
      - key: JWT_SECRET
        sync: false
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
